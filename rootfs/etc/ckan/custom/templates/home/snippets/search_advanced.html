{# Home search override: 1 coluna, texto preto, checkboxes, inclui campos do YAML #}

<style>
  .homepage .module-search, .homepage .module-search * { color:#000 !important; }
  .homepage .module-search input, .homepage .module-search select { color:#000 !important; }
  .homepage .module-search ::placeholder { color:#555 !important; opacity:1; }
  .homepage .module-search .form-group { margin-bottom: 12px; }
  .homepage .module-search .checkbox { margin: 6px 0; }
  .homepage .module-search .checkbox label { font-weight: normal; }
  .homepage .module-search details { margin: 10px 0; }
  .homepage .module-search details > summary { cursor: pointer; font-weight: bold; }
  .homepage .module-search .smallhint { font-size: 12px; color:#333 !important; }
</style>

<div class="module module-search module-narrow module-shallow box">
  <h2 class="module-heading">{{ _('Pesquisar dados') }}</h2>

  <div class="module-content">
    <form id="home-search-form" class="form-search" method="get" action="{{ h.url_for('dataset.search') }}">

      <div class="form-group">
        <label for="home-q">{{ _('Termo de busca') }}</label>
        <div class="search-input control-group search-giant">
          <input id="home-q" type="text" class="search" name="q"
                 value="{{ request.args.get('q','') }}"
                 placeholder="{{ _('Ex.: meio ambiente') }}"
                 autocomplete="off">
          <button type="submit" aria-label="{{ _('Pesquisar') }}"><i class="icon-search"></i></button>
        </div>
        <div class="smallhint">
          Campos de texto (Autor/Email/Contato) são adicionados ao termo de busca (q).
        </div>
      </div>

      <div class="form-group">
        <label for="home-org">{{ _('Unidade') }}</label>
        <select id="home-org" name="organization" class="form-control">
          <option value="">{{ _('Todas') }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="home-acesso">{{ _('Acesso') }}</label>
        <select id="home-acesso" name="extras_acesso" class="form-control">
          <option value="">{{ _('Todos') }}</option>
          <option value="Público">Público</option>
          <option value="Interno SFB">Interno SFB</option>
          <option value="Restrito projeto">Restrito projeto</option>
          <option value="Em validação">Em validação</option>
          <option value="Histórico/obsoleto">Histórico/obsoleto</option>

      </div>

      <div class="form-group">
        <label for="home-escopo">{{ _('Escopo') }}</label>
        <select id="home-escopo" name="extras_escopo" class="form-control">
          <option value="">{{ _('Todos') }}</option>
          <option value="Dado primário">Dado primário</option>
          <option value="Dado derivado/analítico">Dado derivado/analítico</option>
          <option value="Base de referência">Base de referência</option>
          <option value="Produto informacional">Produto informacional</option>
          <option value="Documento técnico/metodológico">Documento técnico/metodológico</option>
          <option value="Produto editorial/publicação">Produto editorial/publicação</option>

      <div class="form-group">
        <label for="home-abr">{{ _('Abrangência') }}</label>
        <select id="home-abr" name="extras_abrangencia" class="form-control">

          <option value="Estadual">Estadual</option>

      <div class="form-group">
        <label for="home-fonte">{{ _('Fonte') }}</label>
        <select id="home-fonte" name="extras_fonte" class="form-control">

        <div class="form-group">
          <label for="home-doc-fut">{{ _('Documento futuro') }}</label>

        <div class="form-group">

        <hr>

        <div class="form-group">

          <input id="home-autor-email" class="form-control" type="text" placeholder="Ex.: josesilva@email.com">
        </div>

        <div class="form-group">
          <label for="home-contato">{{ _('Pessoa de contato') }}</label>
          <input id="home-contato" class="form-control" type="text" placeholder="Ex.: Contato institucional">
        </div>

        <div class="form-group">
          <label for="home-contato-email">{{ _('Email de contato') }}</label>

        </div>

      <div style="margin-top:12px">
        <a class="btn btn-default" href="{{ h.url_for('home.index') }}">{{ _('Limpar') }}</a>
        <button class="btn btn-primary" type="submit">{{ _('Pesquisar') }}</button>
      </div>
    </form>

    <script>
      (function () {
        function getAll(name) {
          var params = new URLSearchParams(window.location.search);
          var out = [];
          params.forEach(function(v,k){ if(k===name){ out.push(v); } });
          return out;
        }

        function setSelect(id, paramName) {
          var el = document.getElementById(id);
          if (!el) return;
          var vals = getAll(paramName);
          if (!vals.length) return;
          el.value = vals[0];
        }

        function setInput(id, paramName) {
          var el = document.getElementById(id);
          if (!el) return;
          var vals = getAll(paramName);
          if (!vals.length) return;
          el.value = vals[0];
        }

        function renderCheckboxList(containerId, paramName, options) {
          var el = document.getElementById(containerId);
          if (!el) return;

          var selected = getAll(paramName);
          options.forEach(function(opt){
            var div = document.createElement('div');
            div.className = 'checkbox';

            var label = document.createElement('label');
            var input = document.createElement('input');
            input.type = 'checkbox';
            input.name = paramName;
            input.value = opt.value;

            if (selected.indexOf(opt.value) !== -1) input.checked = true;

            label.appendChild(input);
            label.appendChild(document.createTextNode(' ' + opt.label));
            div.appendChild(label);
            el.appendChild(div);
          });
        }

        function fillOrganizations() {
          var sel = document.getElementById('home-org');
          if (!sel) return;

          fetch('/api/3/action/organization_list?all_fields=true&limit=1000')
            .then(function(r){ return r.json(); })
            .then(function(data){
              if (!data || !data.success || !data.result) return;
              data.result.forEach(function(org){
                var opt = document.createElement('option');
                opt.value = org.name;
                opt.textContent = org.display_name || org.title || org.name;
                sel.appendChild(opt);
              });
              setSelect('home-org','organization');
            })
            .catch(function(){});
        }

        // Listas do seu YAML (multi checkbox)

          {value:'Portal/Servidor de mapas (GeoServer/OGC)',label:'Portal/Servidor de mapas (GeoServer/OGC)'},

          {value:'PostgreSQL/PostGIS (analítico)',label:'PostgreSQL/PostGIS (analítico)'},

        ];

          {value:'Dados biofísicos',label:'Dados biofísicos'},

          {value:'Tabular',label:'Tabular'},

          {value:'Controle de qualidade',label:'Controle de qualidade'},
          {value:'Série histórica',label:'Série histórica'},

        setInput('home-valid','extras_validade');

        // Autor/contato: preserva valores em inputs (pela URL) e injeta no q no submit
        setInput('home-autor','_author');
        setInput('home-autor-email','_author_email');
        setInput('home-contato','_maintainer');
        setInput('home-contato-email','_maintainer_email');

        document.getElementById('home-search-form').addEventListener('submit', function(){
          function val(id){ var e=document.getElementById(id); return e? (e.value||'').trim() : ''; }
          var qEl = document.getElementById('home-q');
          var q = (qEl && qEl.value) ? qEl.value.trim() : '';

          var extraText = [val('home-autor'), val('home-autor-email'), val('home-contato'), val('home-contato-email')]
            .filter(Boolean)
            .join(' ');

          if (extraText) {
            q = (q ? (q + ' ') : '') + extraText;
            if (qEl) qEl.value = q;
          }

          // Persistir esses 4 campos como params “_...” para voltar preenchido ao voltar do /dataset
          // (sem exigir facet/solr). Como é GET, criamos hidden inputs.
          function ensureHidden(name, value){
            var existing = document.querySelector('input[type="hidden"][name="'+name+'"]');
            if (!existing) {
              existing = document.createElement('input');
              existing.type = 'hidden';
              existing.name = name;
              document.getElementById('home-search-form').appendChild(existing);
            }
            existing.value = value || '';
          }
          ensureHidden('_author', val('home-autor'));
          ensureHidden('_author_email', val('home-autor-email'));
          ensureHidden('_maintainer', val('home-contato'));
          ensureHidden('_maintainer_email', val('home-contato-email'));
        });
      })();

  </div>
</div>
