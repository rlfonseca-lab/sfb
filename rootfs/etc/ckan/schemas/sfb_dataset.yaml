scheming_version: 2
dataset_type: dataset
about: Schema SFB
about_url: http://github.com/ckan/ckanext-scheming

dataset_fields:
- field_name: title
  label: Título
  preset: title
  form_placeholder: O título do material a ser catalogado

- field_name: name
  label: Slug
  preset: dataset_slug
  form_placeholder: 'Ex: minha_documentacao'

- field_name: notes
  label: Descrição
  form_snippet: markdown.html

- field_name: owner_org
  label: Unidade responsável
  preset: dataset_organization

- field_name: author
  label: Autor/Fonte
  form_placeholder: José da Silva
  display_property: dc:creator

- field_name: responsavel
  label: Responsável pelo cadastro
  form_placeholder: José da Silva

- field_name: responsavel_email
  label: Email do responsável
  form_placeholder: josesilva@email.com
  display_property: dc:contributor
  display_snippet: email.html
  display_email_name_field: author

