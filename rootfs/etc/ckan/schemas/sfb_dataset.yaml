resource_fields:
- field_name: name
  label: Nome do recurso # Ajustado no E-19: manter no recurso, mas usar apenas quando diferir do título do registro
  form_placeholder: Ex. Relatório anual do projeto X
  validators: ignore_missing
  help_text: Preencha apenas se este recurso precisar de nome próprio diferente do título do registro.

- field_name: format
  label: Formato do recurso
  form_snippet: select.html
  display_snippet: select.html
  choices:
  - value: PDF
    label: PDF
  - value: CSV
    label: CSV
  - value: XLSX
    label: XLSX
  - value: DOCX
    label: DOCX
  - value: PPTX
